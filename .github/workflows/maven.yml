name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 7
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: [11, 17, 21]
        runtime: [ol, wlp-ee9, wlp-ee10, wlp-ee11]
        runtime_version: [26.0.0.5]
        exclude:
        - java: 21
          runtime: wlp-ee9
        - java: 11
          runtime: wlp-ee11

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Build with Maven
      run: mvn verify -Druntime="${{ matrix.runtime }}" -DruntimeVersion="${{ matrix.runtime_version }}"
